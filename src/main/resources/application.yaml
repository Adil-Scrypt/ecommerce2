spring:
  application:
    name: ecommerce2
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ecommerce2}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-key-before-production-256-bit}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

logging:
  level:
    root: INFO
    com.adilzhanabdambayev.ecommerce2: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
